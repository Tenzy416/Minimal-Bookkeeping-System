<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極簡記帳 Minimal Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Dashboard Balance Section -->
        <header class="dashboard">
            <div class="balance-card">
                <h2>目前結餘</h2>
                <div class="balance-amount" id="total-balance">$0</div>
                <div class="summary">
                    <div class="income">
                        <span class="label"><i class="fas fa-arrow-down" style="font-size: 0.8em; margin-right: 4px;"></i>總收入</span>
                        <span class="amount" id="total-income">$0</span>
                    </div>
                    <div class="expense">
                        <span class="label"><i class="fas fa-arrow-up" style="font-size: 0.8em; margin-right: 4px;"></i>總支出</span>
                        <span class="amount" id="total-expense">$0</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Add Transaction Section -->
        <section class="add-transaction card">
            <h3 class="section-title">新增紀錄</h3>
            <form id="transaction-form">
                <div class="toggle-group">
                    <input type="radio" name="type" id="type-expense" value="expense" checked>
                    <label for="type-expense" class="toggle-btn expense-btn">支出</label>
                    
                    <input type="radio" name="type" id="type-income" value="income">
                    <label for="type-income" class="toggle-btn income-btn">收入</label>
                </div>
                
                <div class="form-row">
                    <div class="form-group amount-group">
                        <label for="amount">金額</label>
                        <div class="input-with-icon">
                            <span class="currency-symbol">$</span>
                            <input type="number" id="amount" placeholder="0" required min="1">
                        </div>
                    </div>
                    <div class="form-group date-group">
                        <label for="date">日期</label>
                        <input type="date" id="date" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="category">類別</label>
                        <div class="select-wrapper">
                            <select id="category" required>
                                <!-- Categories dynamically loaded -->
                            </select>
                            <i class="fas fa-chevron-down select-icon"></i>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="note">備註</label>
                    <input type="text" id="note" placeholder="例如：午餐、買書...">
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-plus"></i> 儲存紀錄
                </button>
            </form>
        </section>

        <!-- History Section -->
        <section class="history card">
            <h3 class="section-title">歷史紀錄</h3>
            <ul class="transaction-list" id="transaction-list">
                <!-- Transactions dynamically loaded -->
            </ul>
        </section>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
